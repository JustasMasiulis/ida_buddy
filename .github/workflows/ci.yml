name: ci

on:
  push:
  pull_request:

jobs:
  test:
    # Tiers 1-3 only: no IDA/idalib in CI, so the Tier-4 integration suite is
    # not collected. Those tests also self-skip when idapro is unavailable.
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Test (Tiers 1-3)
        run: python -m pytest tests --ignore=tests/integration -q
